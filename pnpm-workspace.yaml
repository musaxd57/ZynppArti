packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  # core-js postinstall yalnız funding mesajıdır → build gerekmez (açıkça reddet, install hatasını önler).
  core-js: false
  esbuild: true
  sharp: true

# Bu paketlerin kurulum (build) script'lerine izin ver (pnpm 11 varsayılan olarak bloklar).
# esbuild → vitest/next derleyici; sharp → Next.js görsel optimizasyonu.
onlyBuiltDependencies:
  - esbuild
  - sharp
